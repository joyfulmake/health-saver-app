<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Life OS</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life OS">
<meta name="description" content="Track finance, time, habits and nature alignment">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230f0f0f'/><text y='.9em' font-size='72' x='14'>🧭</text></svg>">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%;scroll-behavior:smooth}
body{overscroll-behavior-y:contain}
:root{
  --bg:#fff;--text:#0f0f0f;--muted:#6b7280;--faint:#9ca3af;
  --soft:#f5f4f1;--softer:#f9f8f6;--border:rgba(0,0,0,.08);
  --cb:#1A4A8C;--cg:#1A6B3C;--ca:#B07020;--cr:#B83020;
  --cp:#5C2A9D;--ct:#0F6B6B;--co:#C06520;
  --bb:rgba(26,74,140,.08);--bg2:rgba(26,107,60,.08);
  --ba:rgba(176,112,32,.09);--br:rgba(184,48,32,.08);
  --bp:rgba(92,42,157,.09);
  --gwb:0 0 22px rgba(26,74,140,.22);
  --gwg:0 0 22px rgba(26,107,60,.22);
  --gwr:0 0 22px rgba(184,48,32,.22);
  --gwa:0 0 22px rgba(176,112,32,.22);
}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
.wrap{max-width:920px;margin:0 auto;padding:0 18px 150px}
.hdr{padding:22px 0 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hdr-l{display:flex;align-items:center;gap:11px}
.hdr-logo{width:40px;height:40px;background:#0f0f0f;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.hdr-name{font-size:21px;font-weight:900;letter-spacing:-.5px}
.hdr-sub{font-size:11px;color:var(--faint);font-weight:700;margin-top:1px}
.hdr-btns{display:flex;gap:7px}
.btn-pri{background:#0f0f0f;color:#fff;border:none;border-radius:11px;padding:10px 17px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .15s}
.btn-pri:hover{opacity:.78}
.btn-sec{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:11px;padding:9px 13px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:rgba(0,0,0,.22);color:var(--text)}
.now-strip{border-radius:14px;padding:12px 15px;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--softer);border:1px solid var(--border)}
.now-l{display:flex;align-items:center;gap:10px}
.now-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulseA 2.2s ease-in-out infinite}
@keyframes pulseA{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.7);opacity:.5}}
.now-text{font-size:13px;font-weight:800}
.now-sub{font-size:11px;font-weight:700;color:var(--muted);margin-top:1px}
.now-time{font-size:12px;font-weight:800;color:var(--faint);white-space:nowrap}
.tabs{display:flex;border-bottom:1.5px solid var(--border);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;font-family:inherit;font-size:13px;font-weight:800;color:var(--faint);padding:9px 14px;cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s;letter-spacing:-.1px}
.tab.on{color:var(--text);border-bottom-color:var(--text)}
.tab:hover:not(.on){color:#444}
.pane{display:none}.pane.on{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite;margin-right:4px}
.score4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.sc4{border-radius:14px;padding:16px 13px;background:var(--softer);border:1px solid var(--border);text-align:center;transition:box-shadow .2s}.sc4:hover{box-shadow:0 4px 20px rgba(0,0,0,.07)}
.sc4-ico{font-size:18px;margin-bottom:5px}
.sc4-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.sc4-lbl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1.1px;color:var(--faint);margin-top:5px}
.sc4-bar{height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin-top:9px;overflow:hidden}
.sc4-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.m2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.m3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.mc{border-radius:14px;padding:14px;border:1px solid rgba(0,0,0,.04)}
.mc-lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;opacity:.6;margin-bottom:5px}
.mc-val{font-size:22px;font-weight:900;letter-spacing:-.8px;line-height:1.1}
.mc-sub{font-size:11px;margin-top:4px;font-weight:700;opacity:.62}
.mcb{background:#EAF6EF;color:var(--cg);box-shadow:0 2px 14px rgba(26,107,60,.1)}
.mcr{background:#FBE9E6;color:var(--cr);box-shadow:0 2px 14px rgba(184,48,32,.1)}
.mcp{background:#E8EFF8;color:var(--cb);box-shadow:0 2px 14px rgba(26,74,140,.1)}
.mcn{background:#FBE9E6;color:var(--cr)}
.mcpu{background:#F0EBF8;color:var(--cp);box-shadow:0 2px 14px rgba(92,42,157,.1)}
.mca{background:#FFF8EC;color:var(--ca);box-shadow:0 2px 14px rgba(176,112,32,.1)}
.mct{background:#E7F4EB;color:var(--cg)}
.mco{background:#FEF3E8;color:var(--co)}
.bal{border-radius:20px;padding:22px 24px;margin-bottom:14px;border:1px solid transparent}
.bal.pos{background:#EDF0FB;box-shadow:0 4px 28px rgba(30,50,160,.08);border-color:rgba(30,60,180,.07)}
.bal.neg{background:#FBE9E6;box-shadow:0 4px 28px rgba(184,48,32,.08);border-color:rgba(184,48,32,.07)}
.bal-lbl{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;opacity:.6;margin-bottom:4px}
.bal.pos .bal-lbl,.bal.pos .bal-amt{color:#111D5E}
.bal.neg .bal-lbl,.bal.neg .bal-amt{color:#8C1A0A}
.bal-amt{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1}
.bal-sub{font-size:13px;color:var(--muted);margin-top:7px;font-weight:700}
.ki{background:var(--bb);border-left:3px solid var(--cb);border-radius:0 14px 14px 0;padding:13px 15px;margin-bottom:18px;font-size:13px;font-weight:800;color:var(--cb);line-height:1.65;box-shadow:var(--gwb)}
.ki-lbl{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:1px;opacity:.65;margin-bottom:4px}
.dsec{margin-bottom:18px}
.dsec-t{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1.2px;color:var(--faint);margin-bottom:8px}
.dstk{display:flex;flex-direction:column;gap:7px}
.dc{border-radius:14px;padding:13px 15px 13px 18px;position:relative}
.dc::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.dch{background:var(--br);border:1px solid rgba(184,48,32,.14)}.dch::before{background:var(--cr)}
.dcm{background:var(--ba);border:1px solid rgba(176,112,32,.14)}.dcm::before{background:var(--ca)}
.dcl{background:var(--bb);border:1px solid rgba(26,74,140,.1)}.dcl::before{background:var(--cb)}
.dcok{background:var(--bg2);border:1px solid rgba(26,107,60,.14)}.dcok::before{background:var(--cg)}
.dc-p{font-size:14px;font-weight:800;margin-bottom:4px}
.dc-t{font-size:12px;font-weight:700;color:var(--muted);line-height:1.6}
.hloop{border-radius:14px;padding:13px 15px;background:var(--bp);border:1px solid rgba(92,42,157,.14);margin-bottom:8px}
.hloop-h{font-size:13px;font-weight:900;color:var(--cp);margin-bottom:4px}
.hloop-b{font-size:12px;font-weight:700;color:var(--muted);line-height:1.6}
.elist{display:flex;flex-direction:column;gap:7px}
.ec{border-radius:14px;padding:12px 13px;display:flex;align-items:center;gap:11px;border:1px solid rgba(0,0,0,.05);transition:box-shadow .15s}
.ec:hover{box-shadow:0 2px 14px rgba(0,0,0,.06)}
.ei{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.eb{flex:1;min-width:0}
.en{font-weight:800;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.em{font-size:11px;color:#ccc;margin-top:2px;display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;padding:2px 7px;border-radius:5px;white-space:nowrap}
.er{text-align:right;flex-shrink:0}
.ea{font-size:15px;font-weight:900;letter-spacing:-.3px}
.ed{font-size:11px;color:#ccc;font-weight:700;margin-top:1px}
.eact{display:flex;gap:4px;flex-shrink:0}
.bsm{background:rgba(0,0,0,.06);border:none;border-radius:6px;padding:5px 9px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;color:#333;transition:background .12s}
.bsm:hover{background:rgba(0,0,0,.1)}
.bdel{background:rgba(184,48,32,.1);color:var(--cr)}
.bcon{background:var(--cr);color:#fff}
.bgk{background:rgba(92,42,157,.12);color:var(--cp)}
.bgdo{background:rgba(15,107,107,.12);color:var(--ct)}
.bgrf{background:rgba(176,112,32,.12);color:var(--ca)}
.bgfl{background:rgba(26,107,60,.12);color:var(--cg)}
.bgdi{background:rgba(26,74,140,.1);color:var(--cb)}
.bgds{background:rgba(192,101,32,.1);color:var(--co)}
.bglo{background:rgba(26,107,60,.1);color:var(--cg)}
.bgme{background:rgba(176,112,32,.1);color:var(--ca)}
.bghi{background:rgba(184,48,32,.1);color:var(--cr)}
.bch{display:flex;flex-direction:column;gap:8px}
.br{display:flex;align-items:center;gap:9px}
.br-n{font-size:11px;font-weight:800;color:#bbb;width:88px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br-t{flex:1;background:rgba(0,0,0,.07);border-radius:5px;height:15px;overflow:hidden}
.br-f{height:100%;border-radius:5px;transition:width .45s ease;min-width:3px}
.br-v{font-size:12px;font-weight:800;min-width:76px;color:#111;flex-shrink:0}
.ccard{background:var(--softer);border-radius:14px;padding:14px}
.ctitle{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#ccc;margin-bottom:10px}
.tcol{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.insight{background:var(--softer);border-left:3px solid #DDD;border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:14px;font-size:13px;font-weight:700;color:#444;line-height:1.8}
.insight strong{color:#111;font-weight:900}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.mode-tile{border-radius:12px;padding:12px 13px}
.mode-tile-t{font-size:13px;font-weight:900;margin-bottom:3px}
.mode-tile-d{font-size:11px;font-weight:700;opacity:.75;line-height:1.5}
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.fchip{background:#F2F0EC;border:none;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;color:#888;transition:all .15s}
.fchip.on{background:#111;color:#fff}
.cnt{display:inline-flex;align-items:center;background:rgba(0,0,0,.1);color:inherit;border-radius:20px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:4px}
.slbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#ccc;margin-bottom:9px}
.vsw{display:flex;gap:5px;margin-bottom:12px}
.vbtn{background:#F2F0EC;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;color:#888;transition:all .15s;text-transform:capitalize}
.vbtn.on{background:#111;color:#fff}
.pnav{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.pb{background:#F2F0EC;border:none;border-radius:8px;width:30px;height:30px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#444;flex-shrink:0;transition:background .12s}
.pb:hover{background:#E2E0DC}
.plbl{font-size:14px;font-weight:800;flex:1;text-align:center}
.empty{text-align:center;padding:36px 0;color:#ccc;font-size:14px;font-weight:700}
.streak-wrap{margin-bottom:18px}
.streak-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.streak-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--faint)}
.streak-count{font-size:12px;font-weight:900;color:var(--cg)}
.streak-grid{display:flex;flex-wrap:wrap;gap:3px}
.sc{width:11px;height:11px;border-radius:2px;background:rgba(0,0,0,.06);flex-shrink:0}
.sc.l1{background:rgba(26,107,60,.22)}.sc.l2{background:rgba(26,107,60,.45)}.sc.l3{background:rgba(26,107,60,.7)}.sc.l4{background:var(--cg)}
.streak-leg{display:flex;align-items:center;gap:5px;margin-top:7px;font-size:10px;font-weight:700;color:var(--faint)}
.sl-c{width:10px;height:10px;border-radius:2px}
.radar-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:20px}
.radar-cap{font-size:11px;font-weight:700;color:var(--faint);margin-top:7px;text-align:center}
.circ-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:16px}
.circ-cap{font-size:11px;font-weight:700;color:var(--faint);margin-top:6px;text-align:center}
.nat-hero{border-radius:20px;padding:20px 22px;margin-bottom:14px;border:1px solid rgba(0,0,0,.06)}
.nat-badge{display:inline-block;border-radius:8px;padding:3px 11px;font-size:11px;font-weight:900;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase;color:#fff}
.nat-title{font-size:20px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.nat-sub{font-size:13px;font-weight:700;line-height:1.65;opacity:.78}
.nat-tip{border-radius:14px;padding:13px 15px;background:var(--softer);border:1px solid var(--border);margin-bottom:9px}
.nat-tip-h{font-size:14px;font-weight:900;margin-bottom:4px}
.nat-tip-b{font-size:12px;font-weight:700;color:var(--muted);line-height:1.65}
.wr-hero{border-radius:20px;padding:20px 22px;background:linear-gradient(135deg,#0f0f0f 0%,#1a1a2e 100%);margin-bottom:16px;color:#fff}
.wr-hero-t{font-size:20px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.wr-hero-s{font-size:13px;opacity:.55;font-weight:700}
.wr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.wr-stat{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 13px}
.wr-stat-t{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;opacity:.5;margin-bottom:4px;color:#fff}
.wr-stat-v{font-size:18px;font-weight:900;color:#fff}
.wr-stat-s{font-size:11px;font-weight:700;opacity:.45;margin-top:2px;color:#fff}
.wr-ai{background:var(--softer);border-radius:14px;padding:15px 16px;margin-bottom:10px;border:1px solid var(--border)}
.wr-ai-t{font-size:13px;font-weight:900;margin-bottom:7px}
.wr-ai-b{font-size:13px;font-weight:700;color:var(--muted);line-height:1.7}
.wr-btn{width:100%;padding:13px;border-radius:14px;border:none;background:#0f0f0f;color:#fff;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:12px;transition:opacity .15s}
.wr-btn:hover{opacity:.82}
.wr-btn:disabled{opacity:.4;cursor:not-allowed}
.wiz-wrap{padding-bottom:20px}
.wiz-prog{padding:18px 0 6px}
.wiz-track{height:3px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;margin-bottom:8px}
.wiz-fill{height:100%;background:#0f0f0f;border-radius:2px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.wiz-steps{display:flex;justify-content:space-between}
.wiz-sl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);transition:color .2s}
.wiz-sl.on{color:var(--text)}.wiz-sl.done{color:var(--cg)}
.wcard{background:var(--softer);border-radius:18px;padding:20px 19px;margin-bottom:11px;border:1px solid var(--border)}
.wcard-hi{background:#fff;border:2px solid rgba(0,0,0,.1);border-radius:18px;padding:20px 19px;margin-bottom:11px;box-shadow:0 2px 18px rgba(0,0,0,.05)}
.wq{font-size:19px;font-weight:900;letter-spacing:-.4px;margin-bottom:6px}
.wqdim{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:14px}
.winp{width:100%;padding:13px 15px;border-radius:14px;border:2px solid var(--border);font-size:16px;font-family:inherit;font-weight:800;outline:none;background:#fff;color:var(--text);transition:border-color .15s;-webkit-appearance:none;appearance:none}
.winp:focus{border-color:rgba(0,0,0,.38);box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.wslbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--faint);margin-bottom:9px;margin-top:16px}
.wchips{display:flex;flex-wrap:wrap;gap:7px}
.wchip{background:#fff;border:2px solid var(--border);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--muted);transition:all .15s}
.wchip.on{background:var(--text);border-color:var(--text);color:#fff}
.wchip:hover:not(.on){border-color:rgba(0,0,0,.2);color:var(--text)}
.wdurgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.wdb{background:#fff;border:2px solid var(--border);border-radius:10px;padding:12px 5px;font-size:13px;font-weight:900;font-family:inherit;cursor:pointer;color:var(--muted);text-align:center;transition:all .15s}
.wdb.on{background:var(--text);border-color:var(--text);color:#fff}
.wdb:hover:not(.on){border-color:rgba(0,0,0,.2);color:var(--text)}
.w2g{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.w3g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.wbb{background:#fff;border:2px solid var(--border);border-radius:14px;padding:17px 10px;font-size:12px;font-weight:900;font-family:inherit;cursor:pointer;text-align:center;color:var(--muted);transition:all .18s;line-height:1.4}
.wbb .we{font-size:22px;display:block;margin-bottom:6px}
.wbb .wl{font-size:14px;font-weight:900;display:block}
.wbb .ws{font-size:10px;font-weight:700;opacity:.6;margin-top:3px;display:block}
.wbb.on{color:#fff;box-shadow:0 4px 22px rgba(0,0,0,.18)}
.wbb:hover:not(.on){border-color:rgba(0,0,0,.18);color:var(--text);transform:translateY(-1px)}
.wfb{background:#fff;border:2px solid var(--border);border-radius:12px;padding:13px 10px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--muted);text-align:center;transition:all .15s;line-height:1.4}
.wfb .wfe{font-size:18px;display:block;margin-bottom:4px}
.wfb.on{color:#fff}
.wfb:hover:not(.on){border-color:rgba(0,0,0,.2);color:var(--text)}
.wnatrow{display:flex;gap:8px;justify-content:center}
.wnatbtn{flex:1;max-width:62px;height:66px;border-radius:14px;background:#fff;border:2px solid var(--border);font-size:20px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:all .18s;gap:3px}

<script>

var CATS=['Work','Learning','Health','Social','Creative','Admin','Personal'];
var ECATS=['Food','Transport','Housing','Health','Shopping','Entertainment','Utilities','Education','Business','Other'];
var ICATS=['Salary','Freelance','Business','Investment','Gift','Other'];
var MODES={
  knowing:{label:'Knowing',color:'#5C2A9D',bg:'rgba(92,42,157,.12)',cls:'bgk',emoji:'📖',desc:'Learning, researching, mapping the terrain'},
  doing:{label:'Doing',color:'#0F6B6B',bg:'rgba(15,107,107,.12)',cls:'bgdo',emoji:'⚡',desc:'Executing, building, shipping real things'},
  refining:{label:'Refining',color:'#B07020',bg:'rgba(176,112,32,.12)',cls:'bgrf',emoji:'🔧',desc:'Polishing, optimizing. Watch the loop'},
  flowing:{label:'Flowing',color:'#1A6B3C',bg:'rgba(26,107,60,.12)',cls:'bgfl',emoji:'🌊',desc:'Efficient, adaptive, in natural stride'},
};
var FRICS={
  low:{label:'Low',color:'#1A6B3C',cls:'bglo',emoji:'✅'},
  medium:{label:'Medium',color:'#B07020',cls:'bgme',emoji:'⚡'},
  high:{label:'High',color:'#B83020',cls:'bghi',emoji:'🔥'},
};
var DUR=[{l:'15m',v:.25},{l:'30m',v:.5},{l:'45m',v:.75},{l:'1h',v:1},{l:'1.5h',v:1.5},{l:'2h',v:2},{l:'3h',v:3},{l:'4h+',v:4}];
var NATICONS=['','🏙️','📱','🌿','🌳','☀️'];
var NATLBL=['','Fully urban','Mixed indoor','Some nature','Mostly outdoor','Fully natural'];
var CATCOLS=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#6B7280'];
var entries=[],activeTab='quicklog',fView='monthly',tView='monthly';
var fRef=null,tRef=null,logFilter=null,delId=null,editId=null;
var wizStep=1,wizDone=false,wizWelcome=true;
var WD={activity:'',category:'Work',duration:1,direction:'directed',mode:'doing',friction:'low',hasFinance:false,financeType:'expense',financeAmount:0,financeCategory:'Food',natureScore:3};
var F={date:'',activity:'',category:'Work',duration:0,direction:'directed',mode:'doing',friction:'low',hasFinance:false,financeType:'expense',financeAmount:0,financeCategory:'Food',note:''};
var insightData=null,insightLoading=false,lastAnalyzed=null;
var reviewData=null,reviewLoading=false,lastReview=null;

function persist(){var j=JSON.stringify(entries);if(window.storage&&window.storage.set)window.storage.set('lifeos_v5',j).catch(function(){try{localStorage.setItem('lifeos_v5',j);}catch(e){}});else try{localStorage.setItem('lifeos_v5',j);}catch(e){}}
function sfBar(t){var i=document.getElementById('sf-icon'),x=document.getElementById('sf-text');if(!i||!x)return;if(t==='cloud'){i.textContent='☁️';x.innerHTML='<strong>Session Storage</strong> Data persists in this Claude session.';}else if(t==='local'){i.textContent='💾';x.innerHTML='<strong>Local Storage</strong> Saved in this browser.';}else{i.textContent='⚠️';x.innerHTML='<strong>No persistent storage</strong>';}}
async function boot(){
  var loaded=false;
  if(window.storage&&window.storage.get){
    try{var r=await window.storage.get('lifeos_v5');if(r&&r.value){entries=JSON.parse(r.value);loaded=true;sfBar('cloud');}}catch(e){}
    try{var ri=await window.storage.get('lifeos_ins_v2');if(ri&&ri.value){var pi=JSON.parse(ri.value);insightData=pi.data;lastAnalyzed=pi.ts;}}catch(e){}
    try{var rr=await window.storage.get('lifeos_rev_v1');if(rr&&rr.value){var pr=JSON.parse(rr.value);reviewData=pr.data;lastReview=pr.ts;}}catch(e){}
  }
  if(!loaded){try{var ls=localStorage.getItem('lifeos_v5')||localStorage.getItem('lifeos_v4');if(ls){entries=JSON.parse(ls);loaded=true;}sfBar('local');}catch(e){sfBar('none');}
  try{var li=localStorage.getItem('lifeos_ins_v2');if(li){var pli=JSON.parse(li);insightData=pli.data;lastAnalyzed=pli.ts;}}catch(e){}}
  if(entries.length)wizWelcome=false;
  fRef=today();tRef=today();
  nowStrip();setInterval(nowStrip,60000);render();
}
function today(){var d=new Date();d.setHours(0,0,0,0);return d;}
function dstr(d){return new Date(d).toISOString().slice(0,10);}
function fM(n){return Math.abs(+n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fH(n){n=+n||0;if(!n)return'0h';var v=parseFloat(n.toFixed(1));return v===Math.floor(v)?Math.floor(v)+'h':v+'h';}
function he(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function getMon(d){var dt=new Date(d),dy=dt.getDay();dt.setDate(dt.getDate()-(dy===0?6:dy-1));dt.setHours(0,0,0,0);return dt;}
function getSun(d){var s=new Date(getMon(d));s.setDate(s.getDate()+6);s.setHours(23,59,59);return s;}
function filterPeriod(arr,v,ref){
  var r=new Date(ref);
  if(v==='daily'){var ds=dstr(r);return arr.filter(function(e){return e.date===ds;});}
  if(v==='weekly'){var mo=getMon(r),su=getSun(r);return arr.filter(function(e){var d=new Date(e.date+'T00:00:00');return d>=mo&&d<=su;});}
  return arr.filter(function(e){var d=new Date(e.date+'T00:00:00');return d.getMonth()===r.getMonth()&&d.getFullYear()===r.getFullYear();});
}
function navRef(ref,v,dir){var d=new Date(ref);if(v==='daily')d.setDate(d.getDate()+dir);else if(v==='weekly')d.setDate(d.getDate()+dir*7);else{d.setDate(1);d.setMonth(d.getMonth()+dir);}return d;}
function pLabel(v,ref){
  if(v==='daily')return ref.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if(v==='weekly'){var mo=getMon(ref),su=getSun(ref);return mo.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' to '+su.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
  return ref.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
}
function nowStrip(){
  var el=document.getElementById('now-strip');if(!el)return;
  var hr=new Date().getHours(),mn=new Date().getMinutes();
  var txt,sub,col;
  if(hr>=5&&hr<8){txt='Prime morning window';sub='Best time for outdoor activity and deep work';col='#1A6B3C';}
  else if(hr>=8&&hr<12){txt='Peak cognitive window';sub='Complex work, key decisions, creative output';col='#1A4A8C';}
  else if(hr>=12&&hr<14){txt='Midday transition';sub='Light tasks, catch-ups, admin';col='#B07020';}
  else if(hr>=14&&hr<17){txt='Execution window';sub='Focused doing tasks. Physical work if possible';col='#0F6B6B';}
  else if(hr>=17&&hr<19){txt='Nature reset window';sub='Best outdoor time in Telangana right now';col='#1A6B3C';}
  else if(hr>=19&&hr<22){txt='Wind-down period';sub='Light review, reading, social. Limit screens';col='#5C2A9D';}
  else{txt='Rest window';sub='Body repairs and memory consolidates. Protect sleep';col='#B83020';}
  el.style.display='flex';
  document.getElementById('now-dot').style.background=col;
  document.getElementById('now-text').textContent=txt;
  document.getElementById('now-sub').textContent=sub;
  document.getElementById('now-time').textContent=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function barChart(rows){
  if(!rows||!rows.length)return'<div class="empty" style="padding:14px 0;font-size:12px">No data yet</div>';
  var max=0;rows.forEach(function(r){if(r[1]>max)max=r[1];});
  return'<div class="bch">'+rows.map(function(r){var w=max>0?((r[1]/max)*100).toFixed(1):0;return'<div class="br"><div class="br-n" title="'+he(r[0])+'">'+he(r[0])+'</div><div class="br-t"><div class="br-f" style="width:'+w+'%;background:'+(r[3]||'#3B82F6')+'"></div></div><div class="br-v">'+r[2]+'</div></div>';}).join('')+'</div>';
}
function bdg(cls,txt){return'<span class="bdg '+cls+'">'+he(txt)+'</span>';}
function sc(v){return v>=70?'var(--cg)':(v>=40?'var(--ca)':'var(--cr)');}
function sg(v){return v>=70?'var(--gwg)':(v>=40?'var(--gwa)':'var(--gwr)');}
function entryCard(e){
  var m=MODES[e.mode]||MODES.doing,isD=e.direction==='directed';
  var hasF=e.hasFinance&&e.financeAmount>0,isI=e.financeType==='income';
  var fc=hasF?(isI?'var(--cg)':'var(--cr)'):'#999';
  var isDel=delId===e.id;
  return'<div class="ec" style="background:'+(isD?'rgba(26,74,140,.03)':'rgba(192,101,32,.03)')+'">'+
    '<div class="ei" style="background:'+m.bg+';color:'+m.color+'">'+m.emoji+'</div>'+
    '<div class="eb"><div class="en">'+he(e.activity)+'</div>'+
    '<div class="em"><span>'+e.date+'</span>'+
    bdg(isD?'bgdi':'bgds',isD?'Directed':'Distractor')+bdg(m.cls,m.label)+
    (e.friction&&FRICS[e.friction]?bdg(FRICS[e.friction].cls,FRICS[e.friction].label):'')+
    (e.natureScore?'<span style="color:#ccc">'+NATICONS[e.natureScore||3]+e.natureScore+'</span>':'')+
    '</div></div>'+
    '<div class="er">'+
    (hasF?'<div class="ea" style="color:'+fc+'">'+(isI?'+':'-')+'&#8377;'+fM(e.financeAmount)+'</div>':'')+
    (e.duration>0?'<div class="ed">'+fH(e.duration)+'</div>':'')+
    '</div>'+
    '<div class="eact"><button class="bsm" onclick="openModal(&#39;'+e.id+'&#39;)">Edit</button>'+
    (isDel?'<button class="bsm bcon" onclick="doDelete(&#39;'+e.id+'&#39;)">Confirm</button><button class="bsm" onclick="cancelDel()">No</button>':'<button class="bsm bdel" onclick="askDel(&#39;'+e.id+'&#39;)">Del</button>')+
    '</div></div>';
}
function buildStreak(){
  var counts={};entries.forEach(function(e){counts[e.date]=(counts[e.date]||0)+1;});
  var now=new Date();now.setHours(0,0,0,0);
  var cells='';
  for(var i=83;i>=0;i--){var d=new Date(now);d.setDate(d.getDate()-i);var ds=dstr(d),n=counts[ds]||0;var cl=n===0?'':(n===1?'l1':(n<=3?'l2':(n<=5?'l3':'l4')));cells+='<div class="sc '+cl+'" title="'+ds+': '+n+' entries"></div>';}
  var streak=0,cur=new Date(now);
  while(true){var ds2=dstr(cur);if((counts[ds2]||0)>0){streak++;cur.setDate(cur.getDate()-1);}else break;}
  return'<div class="streak-wrap"><div class="streak-hdr"><span class="streak-title">84-day activity heatmap</span><span class="streak-count">'+streak+' day streak'+(streak>=7?' &#127942;':streak>=3?' &#9889;':'')+'</span></div><div class="streak-grid">'+cells+'</div><div class="streak-leg"><span>Less</span>'+['','l1','l2','l3','l4'].map(function(c){return'<div class="sl-c '+c+'" style="background:'+(c?'':'rgba(0,0,0,.06)')+'"></div>';}).join('')+'<span>More</span></div></div>';
}
function buildRadar(scores){
  var W=220,cx=110,cy=110,R=74;
  var labels=['Finance','Health','Learning','Nature'],colors=['#B07020','#B83020','#5C2A9D','#1A6B3C'];
  var N=4;
  function pt(ang,r){return{x:cx+r*Math.cos(ang-Math.PI/2),y:cy+r*Math.sin(ang-Math.PI/2)};}
  var pts=scores.map(function(s,i){return pt(i*(2*Math.PI/N),R*(Math.min(100,Math.max(0,s))/100));});
  var poly=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var grid='';
  [25,50,75,100].forEach(function(pct){var gp=Array.from({length:N},function(_,i){return pt(i*(2*Math.PI/N),R*pct/100);});grid+='<polygon points="'+gp.map(function(p){return p.x+','+p.y;}).join(' ')+'" fill="none" stroke="rgba(0,0,0,.07)" stroke-width="1"/>';});
  var axes='';
  for(var i=0;i<N;i++){var ep=pt(i*(2*Math.PI/N),R);axes+='<line x1="'+cx+'" y1="'+cy+'" x2="'+ep.x+'" y2="'+ep.y+'" stroke="rgba(0,0,0,.07)" stroke-width="1"/>';}
  var off=[{x:0,y:-15},{x:20,y:4},{x:0,y:17},{x:-20,y:4}];
  var lbls='';
  labels.forEach(function(l,i){var ep=pt(i*(2*Math.PI/N),R+19);lbls+='<text x="'+(ep.x+off[i].x)+'" y="'+(ep.y+off[i].y)+'" text-anchor="middle" font-size="9" font-weight="800" fill="'+colors[i]+'" font-family="Outfit,sans-serif">'+l+'</text><text x="'+(ep.x+off[i].x)+'" y="'+(ep.y+off[i].y+11)+'" text-anchor="middle" font-size="9" font-weight="700" fill="rgba(0,0,0,.38)" font-family="Outfit,sans-serif">'+Math.round(scores[i])+'</text>';});
  return'<div class="radar-wrap"><svg width="'+W+'" height="'+W+'" viewBox="0 0 '+W+' '+W+'">'+grid+axes+'<polygon points="'+poly+'" fill="rgba(26,74,140,.13)" stroke="#1A4A8C" stroke-width="2" stroke-linejoin="round"/>'+lbls+'</svg><div class="radar-cap">Life balance snapshot. Higher = healthier pattern.</div></div>';
}
function buildClock(){
  var W=200,cx=100,cy=100,R=80,iR=52;
  var hr=new Date().getHours(),mn=new Date().getMinutes();
  var segs=[{s:22,e:29.5,color:'rgba(92,42,157,.18)'},{s:5.5,e:8,color:'rgba(26,107,60,.28)'},{s:8,e:12,color:'rgba(26,74,140,.22)'},{s:12,e:14,color:'rgba(176,112,32,.18)'},{s:14,e:17,color:'rgba(15,107,107,.22)'},{s:17,e:19,color:'rgba(26,107,60,.24)'},{s:19,e:22,color:'rgba(92,42,157,.14)'}];
  function ptA(h,r){var a=h/24*2*Math.PI-Math.PI/2;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
  function arc(s,e,or,ir){var sa=s/24*2*Math.PI-Math.PI/2,ea=e/24*2*Math.PI-Math.PI/2;var p1=ptA(s,or),p2=ptA(e,or),p3=ptA(e,ir),p4=ptA(s,ir);var lg=((e-s+24)%24)>12?1:0;return'M'+p1.x+','+p1.y+' A'+or+','+or+' 0 '+lg+' 1 '+p2.x+','+p2.y+' L'+p3.x+','+p3.y+' A'+ir+','+ir+' 0 '+lg+' 0 '+p4.x+','+p4.y+' Z';}
  var segH=segs.map(function(s){return'<path d="'+arc(s.s,s.e,R,iR)+'" fill="'+s.color+'"/>';}).join('');
  var ticks=[0,6,12,18].map(function(h){var p1=ptA(h,R+2),p2=ptA(h,R+8),pl=ptA(h,R+18);return'<line x1="'+p1.x+'" y1="'+p1.y+'" x2="'+p2.x+'" y2="'+p2.y+'" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/><text x="'+pl.x+'" y="'+pl.y+'" text-anchor="middle" dominant-baseline="middle" font-size="8" font-weight="800" fill="rgba(0,0,0,.3)" font-family="Outfit,sans-serif">'+(h===0?'12am':(h===12?'12pm':h+'h'))+'</text>';}).join('');
  var np=ptA(hr+mn/60,iR-3),npo=ptA(hr+mn/60,R+3);
  var ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  return'<div class="circ-wrap"><svg width="'+W+'" height="'+W+'" viewBox="0 0 '+W+' '+W+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1"/><circle cx="'+cx+'" cy="'+cy+'" r="'+iR+'" fill="var(--softer)" stroke="rgba(0,0,0,.06)" stroke-width="1"/>'+segH+ticks+'<line x1="'+np.x+'" y1="'+np.y+'" x2="'+npo.x+'" y2="'+npo.y+'" stroke="#0f0f0f" stroke-width="2.5" stroke-linecap="round"/><circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#0f0f0f"/><text x="'+cx+'" y="'+(cy-7)+'" text-anchor="middle" font-size="11" font-weight="900" fill="#0f0f0f" font-family="Outfit,sans-serif">'+ts+'</text><text x="'+cx+'" y="'+(cy+9)+'" text-anchor="middle" font-size="8" font-weight="700" fill="rgba(0,0,0,.35)" font-family="Outfit,sans-serif">Now</text></svg><div class="circ-cap">Circadian window map. Green = high nature alignment.</div></div>';
}
function localAnalysis(){
  var R={finance:[],health:[],learning:[],nature:[],habits:[],strengths:[],energyScore:50,alignScore:50,finScore:50,healthScore:50};
  if(entries.length<2)return R;
  var tH=entries.reduce(function(s,e){return s+(+e.duration||0);},0);
  var finE=entries.filter(function(e){return e.hasFinance&&e.financeAmount>0;});
  var exp=finE.filter(function(e){return e.financeType==='expense';});
  var inc=finE.filter(function(e){return e.financeType==='income';});
  var tExp=exp.reduce(function(s,e){return s+(+e.financeAmount||0);},0);
  var tInc=inc.reduce(function(s,e){return s+(+e.financeAmount||0);},0);
  var catE={};exp.forEach(function(e){catE[e.financeCategory]=(catE[e.financeCategory]||0)+(+e.financeAmount||0);});
  var topC=Object.keys(catE).sort(function(a,b){return catE[b]-catE[a];})[0];
  if(topC&&tExp>0&&catE[topC]/tExp>0.38)R.finance.push({pattern:topC+' is '+Math.round(catE[topC]/tExp*100)+'% of tracked spending',severity:'medium',tip:'Category concentration is a silent drain. Check if this is deliberate choice or habitual momentum.'});
  if(tInc>0&&tExp>tInc*1.05)R.finance.push({pattern:'Spending (Rs '+fM(tExp)+') exceeds logged income (Rs '+fM(tInc)+')',severity:'high',tip:'Either income logging is incomplete, or reserves are shrinking. Both need attention.'});
  if(!exp.length&&entries.length>5)R.finance.push({pattern:'No expenses logged yet',severity:'low',tip:'Use Quick Log with the finance toggle. Spending attached to habit context is most useful.'});
  var hiF=entries.filter(function(e){return e.friction==='high';});
  var pctF=entries.length?Math.round(hiF.length/entries.length*100):0;
  if(pctF>28){var fC={};hiF.forEach(function(e){fC[e.category]=(fC[e.category]||0)+1;});var topFC=Object.keys(fC).sort(function(a,b){return fC[b]-fC[a];})[0];R.health.push({pattern:pctF+'% of activities run at high friction, concentrated in '+topFC,severity:'high',tip:'Sustained high friction depletes willpower faster than the activity itself. Simplify one thing in '+topFC+'.'});}
  var distrH=entries.filter(function(e){return e.direction==='distractor';}).reduce(function(s,e){return s+(+e.duration||0);},0);
  var distrPct=tH>0?Math.round(distrH/tH*100):0;
  if(tH>0&&distrH/tH>0.2)R.health.push({pattern:distrPct+'% of logged time ('+fH(distrH)+') is distracted time',severity:'high',tip:'Attention depletes before willpower. Trace the trigger behind the pattern, not just the behavior.'});
  var knowH=entries.filter(function(e){return e.mode==='knowing';}).reduce(function(s,e){return s+(+e.duration||0);},0);
  var refH=entries.filter(function(e){return e.mode==='refining';}).reduce(function(s,e){return s+(+e.duration||0);},0);
  if(tH>0&&knowH/tH<0.08)R.learning.push({pattern:'Only '+Math.round(knowH/tH*100)+'% of time in Knowing mode',severity:'medium',tip:'Execution without deliberate input accumulates learning debt. Even 30 minutes of Knowing per day compounds.'});
  if(tH>0&&refH/tH>0.3)R.learning.push({pattern:Math.round(refH/tH*100)+'% of time in Refining. May be looping.',severity:'medium',tip:'Refining beyond a threshold delays real feedback. Ship and learn from reality.'});
  var natE=entries.filter(function(e){return e.natureScore>0;});
  if(natE.length>0){var avgN=natE.reduce(function(s,e){return s+(+e.natureScore||3);},0)/natE.length;if(avgN<2.5)R.nature.push({pattern:'Average nature alignment: '+avgN.toFixed(1)+'/5. Predominantly screen-heavy.',severity:'high',tip:'20 minutes outdoors daily measurably shifts cortisol and restores directed attention. Schedule it like a task.'});else if(avgN<3.5)R.nature.push({pattern:'Nature alignment at '+avgN.toFixed(1)+'/5. Moderate.',severity:'medium',tip:'One more outdoor activity per day has compound returns. Walking calls, reading outside.'});}
  else if(entries.length>4)R.nature.push({pattern:'Nature alignment not tracked yet',severity:'low',tip:'Quick Log captures it in one tap. Start there.'});
  var distrExp=entries.filter(function(e){return e.direction==='distractor'&&e.hasFinance&&e.financeType==='expense'&&e.financeAmount>0;});
  if(distrExp.length>1){var dT=distrExp.reduce(function(s,e){return s+(+e.financeAmount||0);},0);R.habits.push({head:'Spending tied to distractor activities',body:'Rs '+fM(dT)+' across '+distrExp.length+' entries logged as both distractors and expenses. Attention drain and financial drain running together.'});}
  var hiExp=entries.filter(function(e){return e.friction==='high'&&e.hasFinance&&e.financeType==='expense'&&e.financeAmount>0;});
  if(hiExp.length>1){var hT=hiExp.reduce(function(s,e){return s+(+e.financeAmount||0);},0);R.habits.push({head:'Spending clusters around high-friction sessions',body:'Rs '+fM(hT)+' spent during high-friction activities. Stress spending is a behavioral pattern worth watching closely.'});}
  var dirH=entries.filter(function(e){return e.direction==='directed';}).reduce(function(s,e){return s+(+e.duration||0);},0);
  var dirPct=tH>0?Math.round(dirH/tH*100):0;
  var flowH=entries.filter(function(e){return e.mode==='flowing';}).reduce(function(s,e){return s+(+e.duration||0);},0);
  var flowPct=tH>0?Math.round(flowH/tH*100):0;
  if(dirPct>=60)R.strengths.push({pattern:dirPct+'% directed time. Purposeful and intentional.'});
  if(flowPct>=20)R.strengths.push({pattern:'Flow state at '+flowPct+'% of logged time. Real momentum.'});
  if(pctF<18&&entries.length>3)R.strengths.push({pattern:'Low overall friction. Life running relatively smooth.'});
  if(natE.length>0){var avgN2=natE.reduce(function(s,e){return s+(+e.natureScore||3);},0)/natE.length;if(avgN2>=4)R.strengths.push({pattern:'Nature alignment at '+avgN2.toFixed(1)+'/5. Grounded and embodied.'});}
  R.energyScore=Math.min(100,Math.max(8,50+dirPct*0.4-distrPct*0.45-pctF*0.28+flowPct*0.35));
  var nA=natE.length>0?natE.reduce(function(s,e){return s+(+e.natureScore||3);},0)/natE.length:3;
  R.alignScore=Math.min(100,Math.max(8,Math.round(nA/5*100*0.55+dirPct*0.32+(100-pctF)*0.13)));
  R.finScore=Math.min(100,Math.max(8,tInc>0?(tInc>=tExp?72+Math.min(28,(tInc-tExp)/tInc*50):Math.max(18,52-(tExp-tInc)/tExp*42)):50));
  R.healthScore=Math.min(100,Math.max(8,82-pctF*0.75-distrPct*0.38));
  return R;
}

  if(!F.activity||!F.activity.trim()){alert('Activity name is required.');return;}
  if(!F.date){alert('Date is required.');return;}
  var entry={id:editId||uid(),date:F.date,activity:F.activity.trim(),category:F.category,duration:parseFloat(F.duration)||0,direction:F.direction,mode:F.mode,friction:F.friction,hasFinance:!!F.hasFinance,financeType:F.financeType,financeAmount:F.hasFinance?parseFloat(F.financeAmount)||0:0,financeCategory:F.financeCategory,note:F.note||''};
  if(editId){var old=entries.find(function(e){return e.id===editId;});if(old&&old.natureScore)entry.natureScore=old.natureScore;}
  if(editId)entries=entries.map(function(e){return e.id===editId?entry:e;});else entries.push(entry);
  persist();closeModal();render();
}
function exportCSV(){
  var cols=['id','date','activity','category','duration','direction','mode','friction','financeType','financeAmount','financeCategory','natureScore','note'];
  var rows=[cols.join(',')];
  entries.forEach(function(e){rows.push(cols.map(function(c){var v=String(e[c]!==undefined?e[c]:'');if(v.includes(','))v='"'+v.replace(/"/g,'""')+'"';return v;}).join(','));});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\n')],{type:'text/csv'}));a.download='life-os-export.csv';a.click();
}
function openSettings(){var el=document.getElementById('settings-ov');if(!el)return;var k=localStorage.getItem('lifeos_api_key')||'';var inp=document.getElementById('settings-apikey');if(inp)inp.value=k;el.classList.add('open');}
function closeSettings(){var el=document.getElementById('settings-ov');if(el)el.classList.remove('open');}
function saveSettings(){var inp=document.getElementById('settings-apikey');if(inp){var k=inp.value.trim();if(k)localStorage.setItem('lifeos_api_key',k);else localStorage.removeItem('lifeos_api_key');}closeSettings();}
window.openSettings=openSettings;window.closeSettings=closeSettings;window.saveSettings=saveSettings;
window.sw=sw;window.openModal=openModal;window.closeModal=closeModal;
window.setF=setF;window.toggleFin=toggleFin;window.setFinType=setFinType;window.saveEntry=saveEntry;
window.setLF=setLF;window.setFV=setFV;window.setTV=setTV;window.navF=navF;window.navT=navT;
window.askDel=askDel;window.cancelDel=cancelDel;window.doDelete=doDelete;
window.wn1=wn1;window.wGo=wGo;window.wSave=wSave;window.resetWiz=resetWiz;window.startWiz=startWiz;
window.wsCat=wsCat;window.wsDur=wsDur;window.wsDir=wsDir;window.wsMode=wsMode;window.wsFric=wsFric;
window.wsNat=wsNat;window.wsFinT=wsFinT;window.wTogFin=wTogFin;
window.aiInsights=aiInsights;window.aiWeeklyReview=aiWeeklyReview;

boot();
