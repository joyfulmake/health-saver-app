name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject secrets into index.html
        env:
          RAZORPAY_KEY: ${{ secrets.RAZORPAY_KEY }}
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
          FLOURISH_PRO_KEY: ${{ secrets.FLOURISH_PRO_KEY }}
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          sed -i "s|__RAZORPAY_KEY__|$RAZORPAY_KEY|g" index.html
          sed -i "s|__WEB3FORMS_KEY__|$WEB3FORMS_KEY|g" index.html
          sed -i "s|__FLOURISH_PRO_KEY__|$FLOURISH_PRO_KEY|g" index.html
          python3 -c "import os; open('index.html','w').write(open('index.html').read().replace('__FIREBASE_CONFIG__',os.environ.get('FIREBASE_CONFIG','')))"
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
